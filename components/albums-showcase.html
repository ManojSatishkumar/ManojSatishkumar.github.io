<style>
  .albums-showcase-section {
    position: relative;
    padding: 72px 20px 20px;
    background:
      radial-gradient(circle at top left, rgba(255, 210, 135, 0.16), transparent 24%),
      radial-gradient(circle at top right, rgba(125, 211, 252, 0.16), transparent 28%),
      linear-gradient(180deg, #fffdf9 0%, #f8fbff 100%);
    overflow: hidden;
  }

  .albums-showcase-shell {
    max-width: 1240px;
    margin: 0 auto;
  }

  .albums-showcase-panel {
    padding: 28px 24px 30px;
    border-radius: 34px;
    background: rgba(255, 255, 255, 0.78);
    border: 1px solid rgba(220, 227, 246, 0.94);
    box-shadow:
      0 26px 56px rgba(96, 112, 159, 0.1),
      0 8px 18px rgba(96, 112, 159, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .albums-showcase-header {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: flex-end;
    margin-bottom: 24px;
  }

  .albums-showcase-title {
    margin: 0;
    color: #241b14;
    font-size: clamp(2rem, 3.4vw, 3.3rem);
    line-height: 0.95;
    font-weight: 800;
    letter-spacing: -0.05em;
  }

  .albums-showcase-copy {
    max-width: 640px;
    margin: 14px 0 0;
    color: #7a6755;
    font-size: 1.06rem;
    line-height: 1.7;
  }

  .albums-showcase-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(213, 222, 243, 0.95);
    color: #2b3b60;
    font-size: 0.92rem;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
  }

  .albums-showcase-link:hover {
    color: #1f2f66;
    text-decoration: none;
  }

  .albums-showcase-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 16px;
  }

  .albums-showcase-card {
    color: inherit;
    text-decoration: none;
    display: block;
  }

  .albums-showcase-card:hover {
    color: inherit;
    text-decoration: none;
  }

  .albums-showcase-stack {
    position: relative;
    aspect-ratio: 1 / 1;
    margin-bottom: 12px;
  }

  .albums-showcase-stack::before,
  .albums-showcase-stack::after {
    content: "";
    position: absolute;
    inset: 10px 12px -8px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(227, 229, 236, 0.9);
    box-shadow: 0 18px 34px rgba(122, 102, 73, 0.12);
    transform-origin: center center;
  }

  .albums-showcase-stack::before {
    transform: rotate(-5deg);
  }

  .albums-showcase-stack::after {
    inset: 8px 8px -4px;
    transform: rotate(5deg);
  }

  .albums-showcase-cover {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 26px;
    border: 8px solid #ffffff;
    box-shadow: 0 16px 28px rgba(113, 95, 67, 0.14);
    display: block;
    background: #ffffff;
  }

  .albums-showcase-name {
    color: #111111;
    font-size: 1.12rem;
    line-height: 1.35;
    font-weight: 800;
    text-decoration: none;
  }

  .albums-showcase-count {
    margin-top: 4px;
    color: #8a745e;
    font-size: 0.9rem;
    line-height: 1.35;
    font-weight: 700;
    text-decoration: none;
  }

  .albums-showcase-note {
    margin-top: 8px;
    color: #7a6755;
    font-size: 0.88rem;
    line-height: 1.55;
    text-decoration: none;
  }

  @media (max-width: 1280px) {
    .albums-showcase-shell {
      max-width: 1120px;
    }

    .albums-showcase-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }

  @media (max-width: 1100px) {
    .albums-showcase-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 767px) {
    .albums-showcase-section {
      padding: 56px 0 10px;
    }

    .albums-showcase-panel {
      padding: 22px 18px 24px;
      border-radius: 24px;
    }

    .albums-showcase-header {
      flex-direction: column;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .albums-showcase-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 14px;
    }
  }

  @media (max-width: 520px) {
    .albums-showcase-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<section class="albums-showcase-section">
  <div class="albums-showcase-shell">
    <div class="albums-showcase-panel">
      <div class="albums-showcase-header">
        <div>
          <h2 class="albums-showcase-title">Photo Albums</h2>
          <p class="albums-showcase-copy">
            A visual library of work memories, campus appearances, awards, and
            snapshots across different parts of my journey.
          </p>
        </div>
        <a class="albums-showcase-link" href="/albums/">
          View all albums <i class="fas fa-arrow-right"></i>
        </a>
      </div>

      <div class="albums-showcase-grid" id="albums-showcase-grid"></div>
    </div>
  </div>
</section>

<script src="/albums/data.js"></script>
<script>
  (() => {
    const albums = window.albumCatalog || [];
    const grid = document.getElementById("albums-showcase-grid");
    if (!grid || grid.dataset.bound === "true") {
      return;
    }
    grid.dataset.bound = "true";

    const cards = albums
      .map((album) => {
        const cover = album.images[0];
        return `
          <a class="albums-showcase-card" href="/albums/view.html?album=${encodeURIComponent(album.slug)}" aria-label="Open ${album.title} album">
            <div class="albums-showcase-stack">
              <img class="albums-showcase-cover" src="${cover}" alt="${album.title} album cover" loading="lazy" />
            </div>
            <div class="albums-showcase-name">${album.title}</div>
            <div class="albums-showcase-count">${album.images.length} photos</div>
            <div class="albums-showcase-note">${album.note}</div>
          </a>
        `;
      })
      .join("");

    grid.innerHTML = cards;
  })();
</script>
