    <style>

        filter: blur(0);
        opacity: 0.65;
        z-index: -1;

      .hero::before {
        width: 320px;

      function hashQuote(text) {
        let hash = 0;
        for (let index = 0; index < text.length; index += 1) {
          hash = (hash * 31 + text.charCodeAt(index)) % 1000000;
        }
        return hash;
      }

      function inferMotif(quote, index) {
        const lower = quote.toLowerCase();

        if (/(circle|corner|people)/.test(lower)) return "rings";
        if (/(future|prepare|started|consistency|close|design|today)/.test(lower)) return "steps";
        if (/(tree|leaves|drop|heal|healing|wound|bleed|body)/.test(lower)) return "leaf";
        if (/(road|lanes|path|yesterday|returns|drive)/.test(lower)) return "road";
        if (/(door|promise|leave|walk away|nowhere)/.test(lower)) return "door";
        if (/(pain|anger|emotion|accept|moment|silence)/.test(lower)) return "wave";
        if (/(future|vision|higher|end|okay|calling|clarity)/.test(lower)) return "star";
        if (/(build|foundation|bridge|spend it on|environment)/.test(lower)) return "bridge";
        if (/(thread|hanging|trust|mistake|criticism)/.test(lower)) return "thread";
        if (/(growth|content|happy|yourself|self|freedom)/.test(lower)) return "bloom";
        if (/(choose|choice|advice|argument|character|priorities|habits)/.test(lower)) return "compass";

        return motifs[index % motifs.length];
      }

      function inferCategory(quote) {
        const lower = quote.toLowerCase();

        if (/(future|prepare|today|plan|design|priorities|habits|consistency|started|commitment)/.test(lower)) {
          return "future";
        }
        if (/(heal|healing|wound|pain|hurt|accept|emotion|body|self-care|content|happy by yourself)/.test(lower)) {
          return "healing";
        }
        if (/(friends|circle|people|trust|corner|pretenders|manipulators|love|ex|convenient|waste your time)/.test(lower)) {
          return "relationships";
        }
        if (/(choose|choice|character|responsibility|consequences|behavior|mistake|decision|argument|criticism)/.test(lower)) {
          return "character";
        }
        if (/(walk away|doors|let go|drop|leave|past|yesterday|environment)/.test(lower)) {
          return "release";
        }
        return "growth";
      }

      function getDeepDive(quote) {
        const category = inferCategory(quote);

        const content = {
          future: {
            meaning:
              "This quote is about direction rather than wishful thinking. It argues that the future is rarely shaped by intensity alone; it is shaped by repeated preparation, disciplined choices, and the courage to invest in a version of life that does not fully exist yet.",
            application: [
              "Translate the quote into one concrete action you can repeat this week.",
              "Reduce friction around the habit that supports the future you want.",
              "Judge progress by consistency, not by mood or motivation."
            ],
            caution:
              "The deeper warning here is that drift is also a choice. When you do not intentionally set priorities, other people, circumstances, and short-term comfort will usually set them for you."
          },
          healing: {
            meaning:
              "This quote speaks to recovery as an active process. Healing is not only about what happened to you; it is also about what you now choose to stop normalizing, what you protect, and what kind of environment you allow to shape your mind and body going forward.",
            application: [
              "Identify what still reopens the wound: a space, pattern, person, or internal script.",
              "Replace self-neglect with one form of daily care that is realistic enough to sustain.",
              "Treat healing as responsibility, not punishment."
            ],
            caution:
              "The point is not to rush pain away. It is to stop building a life that keeps feeding the same injury while hoping for a different outcome."
          },
          relationships: {
            meaning:
              "This quote is really about standards. It asks you to look beyond familiarity, chemistry, or history and pay attention to reciprocity, inspiration, honesty, and whether a relationship enlarges your life or slowly reduces it.",
            application: [
              "Measure relationships by consistency and mutual respect, not by occasional intensity.",
              "Notice where loyalty has turned into self-abandonment.",
              "Create space for relationships that align with who you are becoming."
            ],
            caution:
              "What makes this hard is that unhealthy relationships often survive by borrowing language from love, loyalty, or compassion. The quote pushes you to separate those ideas from patterns that repeatedly diminish you."
          },
          character: {
            meaning:
              "This quote emphasizes internal leadership. It points away from blame and toward the quiet work of becoming someone whose choices are steady, self-respecting, and aligned with long-term values rather than temporary urges.",
            application: [
              "Ask what kind of person this decision is training you to become.",
              "Use criticism, mistakes, and discomfort as information instead of identity.",
              "Let standards guide your response before emotion does."
            ],
            caution:
              "The challenge is that character is built in ordinary moments. Most defining decisions do not announce themselves as dramatic turning points; they arrive disguised as small permissions, excuses, and repeated compromises."
          },
          release: {
            meaning:
              "This quote is about making space. Letting go is not always loss; sometimes it is the condition that allows clarity, self-respect, and movement to return. The quote invites you to stop gripping what is no longer growing with you.",
            application: [
              "Name what has already shown you it cannot carry you forward.",
              "Separate missing something from needing it back.",
              "Close one open loop that keeps your energy tied to the past."
            ],
            caution:
              "Release feels risky because familiar pain can feel safer than unfamiliar freedom. The quote asks you to trust that empty space can become fertile space."
          },
          growth: {
            meaning:
              "This quote points toward growth through honesty. It suggests that progress begins when you stop negotiating with what you already know is misaligned and start acting from clarity, discipline, and self-respect.",
            application: [
              "Turn the quote into a personal rule that is easy to remember.",
              "Choose one behavior that would make this quote visible in your daily life.",
              "Review your routines to see whether they support who you say you want to be."
            ],
            caution:
              "Growth often feels uncomfortable because it removes old excuses. Once you see clearly, the harder task is accepting that clarity now asks something of you."
          }
        };

        return content[category];
      }

      function getReflectionPrompt(quote) {
        const lower = quote.toLowerCase();

        if (/(friends|people|circle|love|trust|corner|ex)/.test(lower)) {
          return "Who in your life currently receives your time, trust, and emotional access, and which of those relationships genuinely deserve deeper investment?";
        }
        if (/(future|today|plan|priorities|habits|consistency|commitment)/.test(lower)) {
          return "If this quote became a rule for the next 30 days, what would you start doing differently tomorrow morning?";
        }
        if (/(heal|healing|pain|wound|hurt|body|self-care|content)/.test(lower)) {
          return "What part of your life still asks you to betray your own healing, and what boundary would make recovery easier?";
        }
        if (/(walk away|doors|let go|drop|leave|past|yesterday)/.test(lower)) {
          return "What are you still holding onto mostly because it is familiar, not because it is good for you?";
        }
        return "Where does this quote challenge the story you usually tell yourself, and what action would prove you actually believe it?";
      }

      function getPosterTheme(quote, index) {
        const hash = hashQuote(quote);
        const hue = (hash + index * 29) % 360;
        const sat = 32 + (hash % 16);
        const lightA = 26 + (index % 11);
        const lightB = lightA + 8;
        const lightC = lightA + 18;
        const orbX = 18 + ((hash + index * 11) % 64);
        const orbY = 12 + ((hash + index * 7) % 72);
        const motif = inferMotif(quote, index);
        const type = typographyThemes[index % typographyThemes.length];
        const feel = feelProfiles[index % feelProfiles.length];
        const variant = layoutVariants[index % layoutVariants.length];
        const quoteColor = lightA > 31 ? "rgba(255,255,255,0.94)" : "rgba(248,250,252,0.96)";
        const softText = lightA > 31 ? "rgba(255,255,255,0.72)" : "rgba(241,245,249,0.78)";

        return {
          motif,
          variant,
          label: paletteNames[index % paletteNames.length],
          tag: motifTags[motif],
          style: `
            --poster-bg:
              linear-gradient(155deg,
                hsl(${hue} ${sat}% ${lightA}% / 0.98),
                hsl(${hue} ${Math.max(sat - 4, 18)}% ${lightB}% / 0.97) 52%,
                hsl(${hue} ${Math.max(sat - 10, 16)}% ${lightC}% / 0.96) 100%);
            --quote-color: ${quoteColor};
            --label-color: rgba(255, 255, 255, 0.92);
            --label-bg: rgba(255, 255, 255, 0.12);
            --label-border: rgba(255, 255, 255, 0.18);
            --tag-color: ${softText};
            --mark-color: rgba(255, 255, 255, 0.26);
            --accent-color: rgba(255, 255, 255, 0.72);
            --accent-soft: rgba(255, 255, 255, 0.3);
            --orb-color: hsl(${hue} ${Math.min(sat + 8, 52)}% ${Math.min(lightC + 8, 74)}% / 0.2);
            --orb-x: ${orbX}%;
            --orb-y: ${orbY}%;
            --quote-font: ${type.font};
            --quote-font-style: ${type.style};
            --quote-font-weight: ${type.weight};
            --quote-letter-spacing: ${type.spacing};
            --quote-min-size: ${feel.minSize};
            --quote-max-size: ${feel.maxSize};
            --quote-line-height: ${feel.lineHeight};
            --content-gap: ${feel.contentGap};
            --quote-width: ${feel.width};
            --quote-transform: ${feel.transform};
            --mark-size: ${feel.markSize};
            --quote-word-spacing: ${feel.wordSpacing};
            --tag-transform: ${feel.tagTransform};
            --tag-spacing: ${feel.tagSpacing};
          `
        };
      }

      function getModalPalette(quote, index) {
        const hash = hashQuote(quote);
        const hue = (hash + index * 29) % 360;
        const sat = 36 + (hash % 12);

        return {
          style: `
            --modal-bg-start: hsl(${hue} ${Math.max(sat - 18, 12)}% 97%);
            --modal-bg-end: hsl(${hue} ${Math.max(sat - 16, 12)}% 93%);
            --modal-glow-1: hsl(${hue} ${sat}% 72% / 0.18);
            --modal-glow-2: hsl(${(hue + 18) % 360} ${Math.max(sat - 8, 18)}% 78% / 0.12);
            --modal-border: hsl(${hue} ${Math.max(sat - 16, 12)}% 80% / 0.8);
            --modal-card-bg: hsl(${hue} ${Math.max(sat - 18, 12)}% 99%);
            --modal-card-border: hsl(${hue} ${Math.max(sat - 10, 16)}% 84% / 0.82);
            --modal-kicker-bg: hsl(${hue} ${sat}% 90% / 0.72);
            --modal-accent: hsl(${hue} ${Math.min(sat + 10, 58)}% 34%);
            --modal-accent-soft: hsl(${hue} ${Math.min(sat + 8, 54)}% 48% / 0.42);
            --modal-reflection-bg: hsl(${hue} ${Math.max(sat - 8, 18)}% 92% / 0.92);
            --modal-reflection-border: hsl(${hue} ${Math.max(sat - 4, 18)}% 76% / 0.75);
            --modal-side-start: hsl(${hue} ${Math.min(sat + 10, 56)}% 30%);
            --modal-side-end: hsl(${hue} ${Math.min(sat + 6, 52)}% 22%);
            --modal-link: hsl(${hue} ${Math.min(sat + 18, 64)}% 78%);
          `
        };
      }

      function renderQuotes() {
        const grid = document.getElementById("quotes-grid");

        const posters = quotes
          .map((quote, index) => {
            const theme = getPosterTheme(quote, index);

            return `
              <article class="poster variant-${theme.variant}" style="${theme.style.trim()}" data-quote-index="${index}" tabindex="0" role="button" aria-label="Open details for quote ${index + 1}">
                <div class="poster-noise" aria-hidden="true"></div>
                <div class="poster-top">
                  <div class="poster-kicker">${theme.label}</div>
                  <div class="poster-index">${String(index + 1).padStart(2, "0")}</div>
                </div>
                <div class="poster-content">
                  <div class="quote-mark">“</div>
                  <blockquote>${quote}</blockquote>
                </div>
                <div class="poster-footer">
                  <div class="poster-tag">${theme.tag}</div>
                  <div class="poster-graphic motif-${theme.motif}" aria-hidden="true">
                    <span class="shape"></span>
                  </div>
                </div>
                <div class="poster-accent" aria-hidden="true"></div>
              </article>
            `;
          })
          .join("");

        grid.innerHTML = posters;
      }

      function openQuoteModal(index) {
        const quote = quotes[index];
        const theme = getPosterTheme(quote, index);
        const modalPalette = getModalPalette(quote, index);
        const details = getDeepDive(quote);
        const attributed = attributedQuotes[quote];

        const modal = document.getElementById("quote-modal");
        const panel = document.getElementById("quote-modal-panel");
        const quoteEl = document.getElementById("quote-modal-quote");
        const titleEl = document.getElementById("quote-modal-title");
        const kickerEl = document.getElementById("quote-modal-kicker");
        const meaningEl = document.getElementById("quote-modal-meaning");
        const promptEl = document.getElementById("quote-modal-prompt");
        const authorWrap = document.getElementById("quote-modal-author");
        const authorPhoto = document.getElementById("quote-modal-author-photo");
        const authorName = document.getElementById("quote-modal-author-name");
        const authorRole = document.getElementById("quote-modal-author-role");
        const authorBio = document.getElementById("quote-modal-author-bio");
        const authorNote = document.getElementById("quote-modal-author-note");
        const authorLink = document.getElementById("quote-modal-author-link");

        titleEl.textContent = `Quote ${String(index + 1).padStart(2, "0")}`;
        kickerEl.innerHTML = `<i class="fa-solid fa-quote-left"></i> ${theme.label} / ${theme.tag}`;
        quoteEl.textContent = quote;
        meaningEl.textContent = details.meaning;
        promptEl.textContent = getReflectionPrompt(quote);

        panel.setAttribute("style", modalPalette.style.trim());

        if (attributed) {
          authorWrap.classList.remove("hidden");
          authorPhoto.src = attributed.photo;
          authorPhoto.alt = attributed.person;
          authorName.textContent = attributed.person;
          authorRole.textContent = attributed.role;
          authorBio.textContent = attributed.bio;
          authorNote.textContent = attributed.note;
          authorLink.href = attributed.profile;
        } else {
          authorWrap.classList.add("hidden");
          authorPhoto.removeAttribute("src");
          authorPhoto.alt = "";
          authorName.textContent = "";
          authorRole.textContent = "";
          authorBio.textContent = "";
          authorNote.textContent = "";
          authorLink.removeAttribute("href");
        }

        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
      }

      function closeQuoteModal() {
        const modal = document.getElementById("quote-modal");
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      function attachQuoteInteractions() {
        const posters = document.querySelectorAll(".poster");
        posters.forEach((poster) => {
          const index = Number(poster.getAttribute("data-quote-index"));

          poster.addEventListener("click", () => openQuoteModal(index));
          poster.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openQuoteModal(index);
            }
          });
        });

        const modal = document.getElementById("quote-modal");
        const closeButton = document.getElementById("quote-modal-close");

        closeButton.addEventListener("click", closeQuoteModal);
        modal.addEventListener("click", (event) => {
          if (event.target === modal) {
            closeQuoteModal();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && modal.classList.contains("is-open")) {
            closeQuoteModal();
          }
        });
      }

      renderQuotes();
      attachQuoteInteractions();

      $(function () {
        $("#desktop-nav-bar").load("/components/desktop-nav-bar.html");
        $("#footer").load("/components/footer.html");
      });
