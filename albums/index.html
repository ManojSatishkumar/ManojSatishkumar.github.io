<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Albums | Manoj Satishkumar</title>
    <meta
      name="description"
      content="A visual collection of photo albums by Manoj Satishkumar."
    />
    <link rel="icon" href="/images/favicon.png" type="image/png" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="/albums/data.js"></script>
    <style>
      :root {
        color-scheme: light;
        --page: #f6f1e8;
        --paper: rgba(255, 251, 245, 0.86);
        --paper-strong: rgba(255, 255, 255, 0.94);
        --line: rgba(128, 97, 62, 0.14);
        --ink: #2f241a;
        --muted: #756454;
        --shadow: 0 24px 70px rgba(67, 45, 24, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        color: var(--ink);
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 12% 10%, rgba(245, 158, 11, 0.15), transparent 20%),
          radial-gradient(circle at 88% 16%, rgba(59, 130, 246, 0.12), transparent 18%),
          radial-gradient(circle at 78% 82%, rgba(16, 185, 129, 0.12), transparent 22%),
          linear-gradient(180deg, #fcfaf6 0%, #f6f0e6 48%, #f2eadd 100%);
        padding: 92px 18px 0;
      }

      .page-shell {
        width: min(1360px, calc(100vw - 36px));
        margin: 0 auto;
      }

      .albums-panel {
        margin-top: 22px;
        padding: 24px;
        border-radius: 30px;
        background: var(--paper);
        border: 1px solid rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .section-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      .section-header h2 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.04em;
      }

      .section-header p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .album-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 240px));
        gap: 24px 18px;
      }

      .album-card {
        display: grid;
        gap: 18px;
        padding: 0;
        border: 0;
        background: transparent;
        text-align: left;
        color: inherit;
        cursor: pointer;
        text-decoration: none;
      }

      .album-card:focus-visible {
        outline: 3px solid rgba(59, 130, 246, 0.42);
        outline-offset: 6px;
        border-radius: 24px;
      }

      .album-card:hover .stack {
        transform: translateY(-4px);
      }

      .album-card:hover .stack-photo--top {
        transform: translateY(-10px) rotate(0deg) scale(1.015);
      }

      .stack {
        position: relative;
        aspect-ratio: 0.9 / 1;
        transition: transform 0.28s ease;
      }

      .stack-photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 28px;
        border: 9px solid var(--paper-strong);
        box-shadow:
          0 18px 30px rgba(66, 46, 28, 0.12),
          0 4px 10px rgba(66, 46, 28, 0.08);
        user-select: none;
        pointer-events: none;
      }

      .stack-doc {
        position: absolute;
        inset: 0;
        border-radius: 28px;
        border: 9px solid var(--paper-strong);
        box-shadow:
          0 18px 30px rgba(66, 46, 28, 0.12),
          0 4px 10px rgba(66, 46, 28, 0.08);
        background: linear-gradient(180deg, rgba(255, 251, 245, 0.98), rgba(239, 229, 214, 0.96));
        display: grid;
        place-items: center;
        padding: 18px;
        color: #6b4f35;
        font-size: 0.76rem;
        font-weight: 800;
        line-height: 1.35;
        letter-spacing: 0.04em;
        text-align: center;
        text-transform: uppercase;
        user-select: none;
        pointer-events: none;
      }

      .stack-photo--back {
        transform: rotate(-9deg) translate(-8px, 8px) scale(0.96);
        filter: saturate(0.9) brightness(0.98);
      }

      .stack-photo--mid {
        transform: rotate(7deg) translate(8px, 4px) scale(0.98);
        filter: saturate(0.96) brightness(0.99);
      }

      .stack-photo--top {
        transform: translateY(0) rotate(-2deg);
        transition: transform 0.28s ease;
      }

      .stack-doc--back {
        transform: rotate(-9deg) translate(-8px, 8px) scale(0.96);
      }

      .stack-doc--mid {
        transform: rotate(7deg) translate(8px, 4px) scale(0.98);
      }

      .stack-doc--top {
        transform: translateY(0) rotate(-2deg);
        transition: transform 0.28s ease;
      }

      .album-meta h3 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .album-count {
        margin-top: 4px;
        color: #9a8a78;
        font-size: 0.84rem;
        font-weight: 600;
      }

      .album-note {
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.6;
      }

      #footer {
        margin-top: 36px;
      }

      @media (max-width: 900px) {
        body {
          padding: 84px 14px 0;
        }

        .albums-panel {
          margin-top: 18px;
          padding: 20px 16px;
          border-radius: 26px;
        }

        .section-header {
          display: block;
        }

        .album-grid {
          grid-template-columns: repeat(2, minmax(140px, 1fr));
          gap: 20px 14px;
        }

        .album-meta h3 {
          font-size: 1.15rem;
        }

        .album-count {
          font-size: 0.8rem;
        }
      }

      @media (max-width: 560px) {
        .album-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 18px 12px;
        }

        .stack-photo {
          border-width: 8px;
          border-radius: 24px;
        }

        .stack-doc {
          border-width: 8px;
          border-radius: 24px;
          font-size: 0.68rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="desktop-nav-bar"></div>

    <main class="page-shell">
      <section class="albums-panel" aria-labelledby="albums-title">
        <div class="section-header">
          <div>
            <h2 id="albums-title">Photo Albums</h2>
            <p>Grouped as card stacks, inspired by a photo library overview.</p>
          </div>
        </div>

        <div class="album-grid" id="album-grid"></div>
      </section>
    </main>

    <div id="footer"></div>

    <script>
      const albums = window.albumCatalog || [];

      function renderAlbums() {
        const albumGrid = document.getElementById("album-grid");

        const renderCoverLayer = (source, className, title) => {
          if (source.toLowerCase().endsWith(".pdf")) {
            return `<div class="stack-doc ${className.replace("stack-photo", "stack-doc")}">${title}</div>`;
          }

          return `<img class="${className}" src="${source}" alt="${title} preview photo" loading="lazy" />`;
        };

        albumGrid.innerHTML = albums
          .map(
            (album, index) => `
              <a class="album-card" href="/albums/view.html?album=${encodeURIComponent(album.slug)}" data-album-index="${index}" aria-label="Open ${album.title} album page">
                <div class="stack" aria-hidden="true">
                  ${renderCoverLayer(album.images[2] || album.images[0], "stack-photo stack-photo--back", album.title)}
                  ${renderCoverLayer(album.images[1] || album.images[0], "stack-photo stack-photo--mid", album.title)}
                  ${renderCoverLayer(album.images[0], "stack-photo stack-photo--top", album.title)}
                </div>
                <div class="album-meta">
                  <h3>${album.title}</h3>
                  <div class="album-count">${album.images.length} photos</div>
                  <div class="album-note">${album.note}</div>
                </div>
              </a>
            `
          )
          .join("");
      }

      renderAlbums();

      $(function () {
        $("#desktop-nav-bar").load("/components/desktop-nav-bar.html");
        $("#footer").load("/components/footer.html");
      });
    </script>
  </body>
</html>
